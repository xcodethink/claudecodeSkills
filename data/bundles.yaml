bundles:
  - id: new-project
    name_cn: 启动新项目
    name_en: Start a New Project
    icon: "rocket"
    description_cn: 从零开始一个项目？这套组合帮你建立正确的开发纪律
    description_en: Starting from scratch? This bundle establishes the right development discipline
    skills:
      - superpowers/A-开发方法论/01-测试驱动开发-TDD
      - superpowers/E-Git工作流/01-使用Git-Worktrees
      - curated/A-项目搭建/01-通用项目脚手架
    why_cn: TDD 保证代码质量，Git Worktree 隔离工作流，通用脚手架快速搭建骨架
    why_en: TDD ensures code quality, Git Worktree isolates workflows, scaffold sets up project structure

  - id: debug-session
    name_cn: 系统化调试
    name_en: Systematic Debugging
    icon: "mag"
    description_cn: 遇到 bug 别慌，这套组合帮你科学定位根因
    description_en: Don't panic when bugs hit — this bundle helps you systematically find root causes
    skills:
      - superpowers/A-开发方法论/02-系统化调试
      - superpowers/A-开发方法论/03-完成前验证
    why_cn: 先用调试方法定位根因，再用验证方法确保修复完整
    why_en: First locate root cause with debugging, then verify fix completeness

  - id: code-review
    name_cn: 代码评审
    name_en: Code Review
    icon: "clipboard"
    description_cn: 让 AI 给你做严格的、有套路的代码评审
    description_en: Get rigorous, structured code reviews from AI
    skills:
      - superpowers/C-代码评审/01-请求代码评审
      - superpowers/C-代码评审/02-接收代码评审
    why_cn: 一个发起评审请求，一个指导如何处理评审反馈
    why_en: One initiates review requests, the other guides handling review feedback

  - id: ai-agent
    name_cn: Agent 开发
    name_en: Agent Development
    icon: "robot"
    description_cn: 开发多 Agent 系统的完整方法论
    description_en: Complete methodology for developing multi-agent systems
    skills:
      - superpowers/D-Agent编排/01-并行代理调度
      - superpowers/D-Agent编排/02-子代理驱动开发
      - anthropics/A-官方技能/03-MCP构建器
    why_cn: 并行调度提效，子代理解耦，MCP 标准化接口
    why_en: Parallel dispatch for efficiency, subagent decoupling, MCP for standard interfaces

  - id: frontend-project
    name_cn: 前端项目
    name_en: Frontend Project
    icon: "art"
    description_cn: 前端项目从设计到组件的完整工作流
    description_en: Complete frontend workflow from design to components
    skills:
      - bear2u-skills/C-AI工程与提示词/01-设计提示生成器
      - claudekit/B-前端开发/02-前端开发
      - claudekit/B-前端开发/05-Web框架
    why_cn: 先用设计生成器出方案，再按 React 和 Next.js 技能落地
    why_en: Generate design with prompt generator, then implement with React and Next.js skills

  - id: content-creation
    name_cn: 内容创作
    name_en: Content Creation
    icon: "memo"
    description_cn: 高质量内容生产的完整工具链
    description_en: Complete toolchain for high-quality content production
    skills:
      - composio/C-营销与商业/02-内容研究写作
      - humanizer/A-内容创作/01-AI文本人性化
      - curated/F-技术写作/01-技术文档写作
    why_cn: 内容研究写作输出草稿，Humanizer 去 AI 腔，技术文档保证专业
    why_en: Content research for drafts, Humanizer removes AI patterns, tech docs for professionalism

  - id: error-prevention
    name_cn: 错误预防
    name_en: Error Prevention
    icon: "shield"
    description_cn: 减少 AI 开发犯错的防御性工具组合
    description_en: Defensive toolkit to reduce AI-assisted development mistakes
    skills:
      - curated/C-错误预防/01-AI编码防错清单
      - jeffallan/H-安全编码/01-安全编码守卫
      - curated/C-错误预防/02-依赖安全审计
    why_cn: AI 防错清单避免常见陷阱，安全编码防护 OWASP 漏洞，依赖审计保障供应链
    why_en: AI anti-patterns avoid pitfalls, secure coding prevents OWASP vulns, dep audit protects supply chain
