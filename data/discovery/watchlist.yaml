# =============================================================================
# Skill Repository Watchlist
# =============================================================================
# Repositories known to contain Claude Code skills.
# The discovery engine checks these weekly for new/updated skills.
#
# Status:
#   integrated  — Already processed and live on the site
#   pending     — Known but not yet processed
#   archived    — No longer monitored (deleted, license changed, etc.)
# =============================================================================

