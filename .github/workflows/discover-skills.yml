name: Discover New Skills

on:
  schedule:
    - cron: '0 6 * * 1'       # Every Monday 6:00 UTC
  workflow_dispatch:
    inputs:
      channel:
        description: 'Discovery channel to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - watchlist
          - search
          - awesome-lists

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install pipeline dependencies
        run: cd pipeline && npm ci

      - name: Run discovery
        run: cd pipeline && npx tsx src/discover.ts --channel=${{ inputs.channel || 'all' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
